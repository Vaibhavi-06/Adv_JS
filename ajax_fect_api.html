<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Raw json Data from JsonPlaceholder</h2>
    <button onclick="loadData()">Load JSON Data</button>
    <pre id="dataOutput"></pre>

    <script>
        function loadData(){
            fetch("https://jsonplaceholder.typicode.com/albums")
            .then(response => {
                if(!response.ok){
                    throw new Error("Network issue was not ok");
                }
                return response.json();
            })
            .then(data => {
                document.getElementById("dataOutput").textContent = JSON.stringify(data,null,2);
            })
            .catch(error => {
                document.getElementById("dataOutput").textContent ="Error Loading Data" + error.message;
            });
        }
    </script>
</body>
</html>
