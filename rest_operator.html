<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function sum(num1,num2){
            document.write(num1+num2 + "<br>");
        }
        sum(30,50);
    </script>
    <script>
        function sum1(){
            let sum =0;
            for(let i in arguments) //'arguments - holds all passed values'
            {
                sum +=arguments[i];
            }
            document.write(sum + "<br>"); //return total sum
        }
        sum1(10,30,50,10);
        sum1(10,90,50); //call and print result
    </script>

    <script>
        function sumRest(name,course,...args){
            document.write(`Hello my name is ${name} my course name is ${course}: `);

            let sum = 0;
            for(let i in args){
                sum +=args[i];
            }
            document.write(sum + "<br>");
        }
        sumRest("Anand","Java",30,40,100,40);
        sumRest("Aditya","BE IT",30,40,100,40,87,94);
    </script>
</body>
</html>
